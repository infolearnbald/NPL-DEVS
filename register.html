<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPL-DEVS - Cadastro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="register-container">
    <h1>Cadastro</h1>
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Senha">
    <input type="text" id="username" placeholder="Nome de exibição">
    <input type="url" id="photoUrl" placeholder="Link da foto (opcional)">
    <button id="registerBtn">Criar Conta</button>
    <p>Já tens conta? <a href="index.html">Entrar</a></p>
    <p id="errorMsgReg" class="error"></p>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
